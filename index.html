<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Periodic Table</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background-color: #f0f0f0; padding: 10px; }

    h1 { text-align: center; font-size: 20px; margin-bottom: 8px; color: #333; }

    .grid {
      display: grid;
      grid-template-columns: repeat(18, 36px);
      gap: 2px;
    }

    .cell {
      width: 36px; height: 40px; border-radius: 3px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; border: 1px solid transparent;
      transition: transform 0.1s;
      position: relative;
    }
    .cell:hover { transform: scale(1.15); z-index: 10; border-color: #333; }
    .cell .num  { font-size: 7px;   line-height: 1; }
    .cell .sym  { font-size: 11px;  font-weight: bold; line-height: 1.2; }
    .cell .name { font-size: 5.5px; line-height: 1; text-align: center; white-space: nowrap; overflow: hidden; max-width: 34px; }

    .empty { background: none; }

    /* Category colors */
    .alkali     { background: #ff9999; color: #5a0000; }
    .alkaline   { background: #ffdead; color: #4a2800; }
    .transition { background: #ffc0c0; color: #4a0000; }
    .post       { background: #cccccc; color: #222; }
    .metalloid  { background: #cccc99; color: #333300; }
    .nonmetal   { background: #a0ffa0; color: #004000; }
    .halogen    { background: #ffff99; color: #444400; }
    .noble      { background: #c0ffff; color: #004040; }
    .lanthanide { background: #ffbfff; color: #440044; }
    .actinide   { background: #ff99cc; color: #440022; }

    /* Info box */
    #info {
      margin: 10px auto;
      max-width: 500px;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      font-size: 13px;
      color: #333;
      min-height: 52px;
    }
    #info strong { font-size: 15px; }
    #info span   { color: #666; }

    /* Legend */
    .legend {
      display: flex; flex-wrap: wrap;
      gap: 6px; margin: 8px 0 6px;
      justify-content: center;
    }
    .leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #555; }
    .leg-box { width: 12px; height: 12px; border-radius: 2px; }

    .sep-row { grid-column: 1 / -1; height: 4px; }
  </style>
</head>
<body>

  <div class="leg"><div class="leg-box alkali"></div>Alkali Metal</div>
